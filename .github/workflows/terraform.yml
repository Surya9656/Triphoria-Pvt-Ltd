name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      # No real AWS account/backend is required for this assessment.
      # Initialize without a remote backend so validate/plan can run anywhere.
      - name: Terraform init (no backend)
        id: init
        run: terraform init -backend=false

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      # Plan-only: uses dummy credentials and -refresh=false since no AWS
      # account is provisioned for this exercise. This still exercises the
      # full resource graph and catches configuration errors.
      - name: Terraform plan
        id: plan
        env:
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
          AWS_DEFAULT_REGION: "us-east-1"
          TF_VAR_db_password: "dummy-password-for-plan-only"
        run: |
          terraform plan \
            -var-file="${{ matrix.environment }}.tfvars" \
            -refresh=false \
            -lock=false \
            -no-color \
            -out=tfplan.binary \
          | tee plan_output.txt
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/envs/${{ matrix.environment }}/plan_output.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}\n"
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/envs/${{ matrix.environment }}/plan_output.txt';
            let planText = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'No plan output found.';
            if (planText.length > 60000) {
              planText = planText.slice(0, 60000) + '\n... (truncated, see workflow artifact)';
            }
            const body = `#### Terraform Plan — \`${{ matrix.environment }}\`\n` +
              `* fmt: \`${{ steps.fmt.outcome }}\`\n` +
              `* init: \`${{ steps.init.outcome }}\`\n` +
              `* validate: \`${{ steps.validate.outcome }}\`\n` +
              `* plan: \`${{ steps.plan.outcome }}\`\n\n` +
              `<details><summary>Show Plan</summary>\n\n\`\`\`\n${planText}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail job if validate or plan failed
        if: steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1
