name: Terraform Validation

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - prod

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: ap-south-1
          TF_VAR_db_password: dummy-password
        run: |
          terraform plan \
            -var-file="${{ matrix.environment }}.tfvars" \
            -refresh=false \
            -lock=false \
            -no-color \
            -out=tfplan.binary | tee plan_output.txt
        continue-on-error: true

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: infra/envs/${{ matrix.environment }}/plan_output.txt

      - name: Comment Terraform Plan on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const planPath = 'infra/envs/${{ matrix.environment }}/plan_output.txt';

            let plan = "No plan output found.";

            if (fs.existsSync(planPath)) {
              plan = fs.readFileSync(planPath, 'utf8');
            }

            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + "\n\n...Output Truncated...";
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `
## Terraform Validation - ${{ matrix.environment }}

| Step | Status |
|------|--------|
| Terraform fmt | **${{ steps.fmt.outcome }}** |
| Terraform init | **${{ steps.init.outcome }}** |
| Terraform validate | **${{ steps.validate.outcome }}** |
| Terraform plan | **${{ steps.plan.outcome }}** |

<details>
<summary>Terraform Plan</summary>

\`\`\`
${plan}
\`\`\`

</details>
`
            });

      - name: Fail Workflow if Validation Failed
        if: steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1
