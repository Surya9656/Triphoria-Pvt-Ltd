services:
  db:
    image: postgres:16
    container_name: hotel_bookings_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: hotel_bookings
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Migrations run automatically on first container start (alphabetical order).
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d hotel_bookings"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
